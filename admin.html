<script>
const CLERK_PUBLISHABLE_KEY = "pk_test_REPLACE_ME";
const CLERK_JS_URL = "https://caring-bear-70.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
const ADMIN_ALLOWED_USER_IDS = [
  "user_REPLACE_WITH_YOUR_CLERK_USER_ID"
];
const ADMIN_ALLOWED_EMAILS = [
  "REPLACE_WITH_ADMIN_EMAIL@example.com"
];
const API_URL = "https://ogba-api.erikstromstad.workers.dev";
const CLERK_APPEARANCE = {
  variables: {
    colorPrimary: "#ffffff",
    colorBackground: "#000000",
    colorInputBackground: "#111111",
    colorInputText: "#ffffff",
    colorText: "#ffffff",
    colorTextSecondary: "#cccccc",
    colorNeutral: "#333333",
    borderRadius: "10px"
  },
  elements: {
    socialButtonsBlockButton: {
      backgroundColor: "#ffffff",
      color: "#000000",
      border: "1px solid #d7d7d7"
    },
    socialButtonsProviderIcon: {
      color: "#000000"
    },
    formButtonPrimary: {
      backgroundColor: "#222222",
      color: "#ffffff",
      border: "1px solid #444444"
    }
  }
};
let activeUser = null;
let adminAuthorized = false;

function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

function isAllowedAdmin(user) {
  if (!user) return false;

  const cleanAllowedIds = ADMIN_ALLOWED_USER_IDS.filter(id => !id.includes("REPLACE_WITH"));
  const cleanAllowedEmails = ADMIN_ALLOWED_EMAILS
    .filter(email => !email.includes("REPLACE_WITH"))
    .map(email => email.toLowerCase());

  const userEmail = (user.primaryEmailAddress?.emailAddress || "").toLowerCase();
  return cleanAllowedIds.includes(user.id) || cleanAllowedEmails.includes(userEmail);
}

async function initAdminAuth() {
  const authStatus = document.getElementById("admin-auth-status");
  const signInCard = document.getElementById("admin-signin-card");
  const signInRoot = document.getElementById("admin-signin-root");
  const unauthorized = document.getElementById("admin-unauthorized");
  const adminPanel = document.getElementById("admin");

  if (!CLERK_PUBLISHABLE_KEY || CLERK_PUBLISHABLE_KEY.includes("REPLACE_ME")) {
    authStatus.textContent = "Set Clerk publishable key in admin.html to enable admin auth.";
    return;
  }

  await loadClerkScript();
  await window.Clerk.load();
  activeUser = window.Clerk.user || null;

  if (!activeUser) {
    adminAuthorized = false;
    adminPanel.style.display = "none";
    unauthorized.style.display = "none";
    signInCard.style.display = "block";
    authStatus.textContent = "Sign in with Clerk to access admin tools.";
    window.Clerk.mountSignIn(signInRoot, {
      signUpUrl: "/register.html",
      forceRedirectUrl: "/admin.html",
      appearance: CLERK_APPEARANCE
    });
    return;
  }

  const fullName = [activeUser.firstName, activeUser.lastName].filter(Boolean).join(" ");
  const primaryEmail = activeUser.primaryEmailAddress?.emailAddress || "";
  authStatus.innerHTML = `
    <div class="auth-header-row">
      <div>Signed in as <strong>${fullName || activeUser.username || "User"}</strong> (${primaryEmail})</div>
      <button id="admin-logout-btn" class="secondary-btn" type="button">Log out</button>
    </div>
  `;
  document.getElementById("admin-logout-btn").addEventListener("click", async () => {
    await window.Clerk.signOut({ redirectUrl: "/admin.html" });
  });

  signInCard.style.display = "none";
  adminAuthorized = isAllowedAdmin(activeUser);

  if (!adminAuthorized) {
    adminPanel.style.display = "none";
    unauthorized.style.display = "block";
    return;
  }

  unauthorized.style.display = "none";
  adminPanel.style.display = "block";
  await loadRuns();
}

function loadClerkScript() {
  if (window.Clerk) return Promise.resolve();

  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.async = true;
    script.crossOrigin = "anonymous";
    script.src = CLERK_JS_URL;
    script.setAttribute("data-clerk-publishable-key", CLERK_PUBLISHABLE_KEY);
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("Clerk script failed to load"));
    document.head.appendChild(script);
  });
}

async function createRun() {
  if (!adminAuthorized) return;

  const datetime = document.getElementById("datetime").value;
  const select = document.getElementById("location");
  const location = select.value;
  const selectedOption = select.options[select.selectedIndex];
  const map_link = selectedOption ? selectedOption.dataset.map || "" : "";
  const max = document.getElementById("max").value;
  const notes = document.getElementById("notes").value;

  if (!datetime) {
    alert("Please choose a date and time.");
    return;
  }

  if (!location) {
    alert("Please choose a location.");
    return;
  }

  if (!max || Number(max) < 1) {
    alert("Please enter a valid max player count.");
    return;
  }

  const res = await fetch(`${API_URL}/api/create-run`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      datetime,
      location,
      map_link,
      max_players: Number(max),
      notes
    })
  });

  const data = await res.json();

  if (!data.success) {
    alert(data.error || "Could not create game.");
    return;
  }

  document.getElementById("datetime").value = "";
  document.getElementById("max").value = "20";
  document.getElementById("notes").value = "";

  loadRuns();
}

async function updatePayment(reg_id, payment_status) {
  if (!adminAuthorized) return;

  await fetch(`${API_URL}/api/update-payment`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ reg_id, payment_status })
  });
}

function formatDate(dateString) {
  const parts = dateString.split("T");
  if (parts.length < 2) return dateString;

  const d = parts[0];
  const t = parts[1];
  const [y, m, day] = d.split("-");
  const [h, min] = t.split(":");

  const dt = new Date(y, m - 1, day, h, min);

  return dt.toLocaleDateString("en-US", {
    weekday: "long",
    month: "numeric",
    day: "numeric"
  }) + " " + dt.toLocaleTimeString("en-US", {
    hour: "numeric",
    minute: "2-digit"
  });
}

async function loadRuns() {
  if (!adminAuthorized) return;

  const res = await fetch(`${API_URL}/api/runs`);
  const runs = await res.json();

  const upcoming = document.getElementById("upcoming");
  const past = document.getElementById("past");

  upcoming.innerHTML = "";
  past.innerHTML = "";

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  runs.forEach(run => {
    const runDate = new Date(run.start_time);
    runDate.setHours(0, 0, 0, 0);

    const div = document.createElement("div");
    div.className = "card";

    const dateVal = run.start_time ? run.start_time.slice(0, 16) : "";

    div.innerHTML = `
      <strong>${run.location_name || ""}</strong><br/>
      <small>${formatDate(run.start_time)}</small><br/><br/>

      <input type="datetime-local" value="${dateVal}" id="date-${run.id}" />

      <select id="loc-${run.id}">
        <option ${run.location_name === "Wilshire Elementary" ? "selected" : ""}>Wilshire Elementary</option>
        <option ${run.location_name === "Saint Anthony Village High School" ? "selected" : ""}>Saint Anthony Village High School</option>
        <option ${run.location_name === "Edison Community Gym" ? "selected" : ""}>Edison Community Gym</option>
      </select>

      <input type="number" value="${run.max_players}" id="max-${run.id}" />
      <input value="${run.notes || ""}" id="notes-${run.id}" />

      <button onclick="updateRun(${run.id})">Save</button>
      <button onclick="deleteRun(${run.id})">Delete</button>

      <h4>Players</h4>
      <button id="toggle-btn-${run.id}" onclick="togglePlayers(${run.id})">Expand Players</button>
      <ul id="players-${run.id}" class="player-list" style="display:none;">Loading...</ul>
    `;

    if (runDate >= today) {
      upcoming.appendChild(div);
    } else {
      past.appendChild(div);
    }

    loadPlayers(run.id);
  });
}

  playersList.style.display = isHidden ? "block" : "none";
  toggleBtn.textContent = isHidden ? "Collapse" : "Expand";

async function loadPlayers(id) {
  if (!adminAuthorized) return;

  const res = await fetch(`${API_URL}/api/players?run_id=${id}`);
  const players = await res.json();

  const html = players.map(p => `
    <li>
      <div>${p.name} (${p.status})</div>

      <div class="player-controls">
        <select onchange="updatePayment(${p.reg_id}, this.value)">
          <option value="unpaid" ${p.payment_status === "unpaid" ? "selected" : ""}>Unpaid</option>
          <option value="paid" ${p.payment_status === "paid" ? "selected" : ""}>Paid</option>
        </select>

        <button class="delete-player" onclick="removePlayer(${id}, '${p.email}')">Remove</button>
      </div>
    </li>
  `).join("");

  document.getElementById(`players-${id}`).innerHTML = html || "<li>No players</li>";
}

async function removePlayer(runId, email) {
  if (!adminAuthorized) return;
  if (!confirm("Remove player?")) return;

  await fetch(`${API_URL}/api/cancel`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ run_id: runId, email: email })
  });

  loadRuns();
}

async function updateRun(id) {
  if (!adminAuthorized) return;

  const datetime = document.getElementById(`date-${id}`).value;
  const select = document.getElementById(`loc-${id}`);
  const location = select.value;
  const max = document.getElementById(`max-${id}`).value;
  const notes = document.getElementById(`notes-${id}`).value;

  await fetch(`${API_URL}/api/update-run`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      id,
      datetime,
      location,
      max_players: max,
      notes
    })
  });

  alert("Saved");
}

async function deleteRun(id) {
  if (!adminAuthorized) return;
  if (!confirm("Delete game?")) return;

  await fetch(`${API_URL}/api/delete-run`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  loadRuns();
}

document.getElementById("datetime").addEventListener("change", function () {
  if (!this.value) return;

  const parts = this.value.split("T");
  if (parts.length < 2) return;

  const d = parts[0];
  const t = parts[1];
  let [h, m] = t.split(":").map(Number);

  m = Math.round(m / 15) * 15;
  if (m === 60) {
    m = 0;
    h++;
  }

  this.value = `${d}T${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
});

initAdminAuth().catch(() => {
  document.getElementById("admin-auth-status").textContent = "Clerk failed to load. Refresh and try again.";
