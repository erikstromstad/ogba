<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Admin - OGBA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <a href="/" class="logo">
    <img src="OGBA-logo.png" />
  </a>

  <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>

  <div class="nav-links" id="navLinks">
    <a href="/runs.html">Games</a>
    <a href="/about.html">About</a>
    <a href="/register.html">Register</a>
    <a href="/admin.html">Admin</a>
  </div>
</div>

<div class="container">

<h1>Admin</h1>

<div id="login">
  <input type="password" id="password" placeholder="Password" />
  <button onclick="checkPassword()">Enter</button>
</div>

<div id="admin" style="display:none;">

<!-- CREATE -->
<div class="admin-form">
  <h2>Create Game</h2>

  <input type="datetime-local" id="datetime" step="900" /><br/><br/>

  <select id="location">
    <option value="">Select Location</option>
    <option value="Eastside YMCA" data-map="https://maps.google.com/?q=Eastside+YMCA+St+Paul">Eastside YMCA</option>
    <option value="Highland Park CC" data-map="https://maps.google.com/?q=Highland+Park+Community+Center+St+Paul">Highland Park CC</option>
    <option value="Oxford CC" data-map="https://maps.google.com/?q=Oxford+Community+Center+St+Paul">Oxford CC</option>
  </select><br/><br/>

  <input type="number" id="max" value="20" /><br/><br/>
  <input type="text" id="notes" placeholder="Doors open at 6:30" /><br/><br/>

  <button onclick="createRun()">Add Game</button>
</div>

<h2>Upcoming Games</h2>
<div id="upcoming" class="admin-grid"></div>

<h2>Past Games</h2>
<div id="past" class="admin-grid"></div>

</div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

const PASSWORD = "Adrian";
const API_URL = "https://ogba-api.erikstromstad.workers.dev";

function checkPassword() {
  if (document.getElementById("password").value === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    loadRuns();
  }
}

async function createRun() {
  const datetime = document.getElementById("datetime").value;
  const locationSelect = document.getElementById("location");
  const location = locationSelect.value;
  const map_link = locationSelect.options[locationSelect.selectedIndex].dataset.map;

  const max = document.getElementById("max").value;
  const notes = document.getElementById("notes").value;

  await fetch(`${API_URL}/api/create-run`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      datetime,
      location,
      map_link,
      max_players: max,
      notes
    })
  });

  loadRuns();
}

async function loadRuns() {
  const res = await fetch(`${API_URL}/api/runs`);
  const runs = await res.json();

  const today = new Date();
  today.setHours(0,0,0,0);

  document.getElementById("upcoming").innerHTML = "";
  document.getElementById("past").innerHTML = "";

  runs.forEach(run => {
    const runDate = new Date(run.start_time);
    runDate.setHours(0,0,0,0);

    const container = runDate >= today
      ? document.getElementById("upcoming")
      : document.getElementById("past");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${run.location_name}</strong><br/>
      <small>${new Date(run.start_time).toLocaleString()}</small><br/><br/>

      <a href="${run.map_link}" target="_blank">View Map</a><br/><br/>

      <input type="datetime-local" value="${run.start_time.slice(0,16)}" id="date-${run.id}" />
      <input value="${run.location_name}" id="loc-${run.id}" />
      <input type="number" value="${run.max_players}" id="max-${run.id}" />
      <input value="${run.notes || ""}" id="notes-${run.id}" />

      <button onclick="updateRun(${run.id})">Save</button>
      <button onclick="deleteRun(${run.id})">Delete</button>

      <ul id="players-${run.id}"></ul>
    `;

    container.appendChild(div);
    loadPlayersAdmin(run.id);
  });
}
</script>

</body>
</html>
