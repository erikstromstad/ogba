<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Admin - Add pickup game</title>
</head>
<link rel="stylesheet" href="style.css">

<div class="navbar">
  <a href="/" class="logo">
    <img src="OGBA-logo.png" alt="OGBA Logo" />
  </a>

  <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>

  <div class="nav-links" id="navLinks">
    <a href="/runs.html">Games</a>
    <a href="/about.html">About</a>
    <a href="/register.html">Register</a>
    <a href="/admin.html">Admin</a>
  </div>
</div>
  
  <body>

  <h1>Admin - Add pickup game</h1>

  <div id="login">
    <input type="password" id="password" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <p id="error" style="color:red;"></p>
  </div>

  <div id="admin" style="display:none;">

    <h2>Pickup game</h2>

    <label>Date & Time:</label><br/>
    <input type="datetime-local" id="datetime" /><br/><br/>

    <label>Location Name:</label><br/>
    <input type="text" id="location" placeholder="Gym" /><br/><br/>

    <label>Max Players:</label><br/>
    <input type="number" id="max" value="20" /><br/><br/>

    <label>Notes:</label><br/>
    <input type="text" id="notes" placeholder="Doors open at 6:30" /><br/><br/>

    <button onclick="createRun()">Add to schedule</button>

    <p id="message"></p>

    <h2>Existing Games</h2>
    <div id="runs"></div>

  </div>

  <script>
    function toggleMenu() {
  const nav = document.getElementById("navLinks");
  nav.classList.toggle("active");
}
    const PASSWORD = "Adrian";
    const API_URL = "https://ogba-api.erikstromstad.workers.dev";

    function checkPassword() {
      const input = document.getElementById("password").value;

      if (input === PASSWORD) {
        document.getElementById("login").style.display = "none";
        document.getElementById("admin").style.display = "block";

        loadRuns(); 
      } else {
        document.getElementById("error").innerText = "Wrong password";
      }
    }

    async function createRun() {
      const datetime = document.getElementById("datetime").value; // ✅ NO conversion
      const location = document.getElementById("location").value;
      const max = document.getElementById("max").value;
      const notes = document.getElementById("notes").value;

      if (!datetime || !location) {
        alert("Fill out all fields");
        return;
      }

      const res = await fetch(`${API_URL}/api/create-run`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          datetime,
          location,
          max_players: max,
          notes
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById("message").innerText = "Game created!";
        loadRuns();
      } else {
        document.getElementById("message").innerText = "Error creating game";
      }
    }

    async function loadRuns() {
      const res = await fetch(`${API_URL}/api/runs`);
      const runs = await res.json();

      const container = document.getElementById("runs");
      container.innerHTML = "";

      runs.forEach(run => {
       const div = document.createElement("div");
        div.className = "card";

        // ✅ NO Date() conversion
        const date = run.start_time.slice(0,16);

        div.innerHTML = `
          <input type="datetime-local" value="${date}" id="date-${run.id}" />
          <input value="${run.location_name}" id="loc-${run.id}" />
          <input type="number" value="${run.max_players}" id="max-${run.id}" />
          <input value="${run.notes || ""}" placeholder="Notes" id="notes-${run.id}" />

          <button onclick="updateRun(${run.id})">Save</button>
          <button onclick="deleteRun(${run.id})">Delete</button>

          <hr/>
        `;

        container.appendChild(div);
      });
    }

    async function updateRun(id) {
      const datetime = document.getElementById(`date-${id}`).value; // ✅ NO conversion
      const location = document.getElementById(`loc-${id}`).value;
      const max = document.getElementById(`max-${id}`).value;
      const notes = document.getElementById(`notes-${id}`).value;

      const res = await fetch(`${API_URL}/api/update-run`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id,
          datetime,
          location,
          max_players: max,
          notes
        })
      });

      const data = await res.json();

      if (data.success) {
        alert("Updated");
      } else {
        alert("Error updating");
      }
    }

    async function deleteRun(id) {
      if (!confirm("Delete this game?")) return;

      const res = await fetch(`${API_URL}/api/delete-run`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });

      const data = await res.json();

      if (data.success) {
        loadRuns();
      } else {
        alert("Error deleting");
      }
    }
  </script>

</body>
</html>
