<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Add pickup game</title>
</head>
<body>
  <h1>Admin - Add pickup game</h1>

  <div id="login">
    <input type="password" id="password" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <p id="error" style="color:red;"></p>
  </div>

  <div id="admin" style="display:none;">
    <h2>Pickup game</h2>

    <label>Date & Time:</label><br/>
    <input type="datetime-local" id="datetime" /><br/><br/>

    <label>Location Name:</label><br/>
    <input type="text" id="location" placeholder="Wilshire Elementary" /><br/><br/>

    <label>Max Players:</label><br/>
    <input type="number" id="max" value="20" /><br/><br/>

    <button onclick="createRun()">Add to schedule</button>

    <p id="message"></p>
  </div>

  <script>
    const PASSWORD = "Adrian";
    const API_URL = "https://ogba-api.erikstromstad.workers.dev";

    function checkPassword() {
      const input = document.getElementById("password").value;

      if (input === PASSWORD) {
        document.getElementById("login").style.display = "none";
        document.getElementById("admin").style.display = "block";
      } else {
        document.getElementById("error").innerText = "Wrong password";
      }
    }

    async function createRun() {
      const datetime = document.getElementById("datetime").value;
      const location = document.getElementById("location").value;
      const max = document.getElementById("max").value;

      if (!datetime || !location) {
        alert("Fill out all fields");
        return;
      }

      const res = await fetch(`${API_URL}/api/create-run`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          datetime,
          location,
          max_players: max
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById("message").innerText = "Run created!";
      } else {
        document.getElementById("message").innerText = "Error creating run";
      }
    }
  </script>
</body>
</html>
