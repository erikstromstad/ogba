<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>OGBA</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
  <a href="/" class="logo">
    <img src="OGBA-logo.png" alt="OGBA Logo" />
  </a>

  <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>

  <div class="nav-links" id="navLinks">
    <a href="/runs.html">Games</a>
    <a href="/about.html">About</a>
    <a href="/register.html">Register</a>
    <a href="/admin.html">Admin</a>
  </div>
</div>

<!-- ===== HERO VIDEO ===== -->
<div class="hero-video">

<!-- Desktop Video -->
<video autoplay muted loop playsinline class="hero-video-bg desktop-video">
  <source src="hero-video.mp4" type="video/mp4">
</video>

<!-- Mobile Video -->
<video autoplay muted loop playsinline class="hero-video-bg mobile-video">
  <source src="hero-video-mobile.mp4" type="video/mp4">
</video>

  <!-- Dark overlay -->
  <div class="hero-overlay"></div>

  <!-- Content -->
  <div class="hero-content">
    
    <!-- Smaller logo overlay -->
    <img src="hero-ogba.png" class="hero-logo" alt="OGBA" />

    <div class="hero-buttons">
      <a href="/about.html" class="btn">About</a>
      <a href="/runs.html" class="btn">Games</a>
      <a href="/register.html" class="btn">Register</a>
    </div>

  </div>

</div>

<script>
function toggleMenu() {
  const nav = document.getElementById("navLinks");
  nav.classList.toggle("active");
}
</script>

</body>
</html>
