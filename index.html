<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickup Basketball</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: #111;
      color: white;
    }
    .box {
      text-align: center;
    }
    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>OGBA Pickup Basketball</h1>
    <p>Enter password to view upcoming runs</p>

    <input type="password" id="password" placeholder="Password" />
    <br />
    <button onclick="checkPassword()">Enter</button>

    <p id="error" style="color:red;"></p>
  </div>

  <script>
    const PASSWORD = "hoops4life";

    function checkPassword() {
      const input = document.getElementById("password").value;

      if (input === PASSWORD) {
        localStorage.setItem("auth", "true");
        window.location.href = "/runs.html";
      } else {
        document.getElementById("error").innerText = "Wrong password";
      }
    }
  </script>
</body>
</html>
