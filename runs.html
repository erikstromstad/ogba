<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Runs</title>
</head>
<body>
  <h1>Upcoming Runs</h1>

  <div id="runs"></div>

  <script>
    // Redirect if not authenticated
    if (localStorage.getItem("auth") !== "true") {
      window.location.href = "/";
    }

    // TEMP placeholder data (we’ll replace with API later)
    const runs = [
      { id: 1, time: "Tuesday 7pm", players: 14, max: 20 },
      { id: 2, time: "Thursday 8pm", players: 18, max: 20 }
    ];

    const container = document.getElementById("runs");

    runs.forEach(run => {
      const div = document.createElement("div");

      div.innerHTML = `
        <h3>${run.time}</h3>
        <p>${run.players} / ${run.max} players</p>
        <input placeholder="Your name" id="name-${run.id}" />
        <button onclick="joinRun(${run.id})">I'm In</button>
        <hr />
      `;

      container.appendChild(div);
    });

    function joinRun(id) {
      const name = document.getElementById(`name-${id}`).value;
      alert(`(Next step) ${name} joining run ${id}`);
    }
  </script>
</body>
</html>
