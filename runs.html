<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Runs</title>
</head>
<body>
  <h1>Upcoming Runs</h1>

  <div id="runs"></div>

<script>
  if (localStorage.getItem("auth") !== "true") {
    window.location.href = "/";
  }

  const API_URL = "https://your-worker-url.workers.dev"; // replace this

  async function loadRuns() {
    const res = await fetch(`${API_URL}/api/runs`);
    const runs = await res.json();

    const container = document.getElementById("runs");
    container.innerHTML = "";

    runs.forEach(run => {
      const div = document.createElement("div");

      div.innerHTML = `
        <h3>${new Date(run.start_time).toLocaleString()}</h3>
        <p>${run.location_name}</p>
        <p>${run.player_count} / ${run.max_players} players</p>

        <input placeholder="Name" id="name-${run.id}" />
        <input placeholder="Email" id="email-${run.id}" />
        <button onclick="joinRun(${run.id})">I'm In</button>
        <hr />
      `;

      container.appendChild(div);
    });
  }

  async function joinRun(id) {
    const name = document.getElementById(`name-${id}`).value;
    const email = document.getElementById(`email-${id}`).value;

    const res = await fetch(`${API_URL}/api/signup`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ run_id: id, name, email })
    });

    const data = await res.json();

    alert(data.status === "confirmed"
      ? "You're in!"
      : "Added to waitlist");

    loadRuns();
  }

  loadRuns();
</script>
</body>
</html>
