<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Upcoming OGBA Pickup Games</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <a href="/" class="logo">
    <img src="OGBA-logo.png" alt="OGBA Logo" />
  </a>

  <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>

  <div class="nav-links" id="navLinks">
    <a href="/runs.html">Games</a>
    <a href="/about.html">About</a>
    <a href="/register.html">Register</a>
    <a href="/admin.html">Admin</a>
  </div>
</div>

<div class="container">
  <h1>Upcoming OGBA Pickup Games</h1>
  <div id="auth-status" class="card auth-status">Checking sign-in status...</div>
  <div id="runs-signin-card" class="card auth-status" style="display:none;">
    <div class="clerk-auth-wrap">
      <div id="runs-signin-root" class="clerk-auth-root"></div>
    </div>
  </div>
  <div id="runs" class="admin-grid"></div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

const CLERK_PUBLISHABLE_KEY = "pk_test_REPLACE_ME";
const CLERK_JS_URL = "https://caring-bear-70.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
const API_URL = "https://ogba-api.erikstromstad.workers.dev";
const CLERK_APPEARANCE = {
  variables: {
    colorPrimary: "#ffffff",
    colorBackground: "#000000",
    colorInputBackground: "#111111",
    colorInputText: "#ffffff",
    colorText: "#ffffff",
    colorTextSecondary: "#cccccc",
    colorNeutral: "#333333",
    borderRadius: "10px"
  },
  elements: {
    socialButtonsBlockButton: {
      backgroundColor: "#ffffff",
      color: "#000000",
      border: "1px solid #d7d7d7"
    },
    socialButtonsProviderIcon: {
      color: "#000000"
    },
    formButtonPrimary: {
      backgroundColor: "#222222",
      color: "#ffffff",
      border: "1px solid #444444"
    }
  }
};
let authReady = false;
let activeUser = null;

/* ===== FORMAT DATE (SAFE) ===== */
function formatDateTime(dateString) {
  const [datePart, timePart] = dateString.split("T");
  const [year, month, day] = datePart.split("-");
  const [hour, minute] = timePart.split(":");

  const dateObj = new Date(year, month - 1, day, hour, minute);

  const formattedDate = dateObj.toLocaleDateString("en-US", {
    weekday: "long",
    month: "numeric",
    day: "numeric",
    year: "numeric"
  });

  const formattedTime = dateObj.toLocaleTimeString("en-US", {
    hour: "numeric",
    minute: "2-digit"
  });

  return `${formattedDate} at ${formattedTime}`;
}

/* ===== LOAD RUNS ===== */
async function loadRuns() {
  const res = await fetch(`${API_URL}/api/runs`);
  const runs = await res.json();

  const container = document.getElementById("runs");
  container.innerHTML = "";

  const today = new Date();
  today.setHours(0,0,0,0);

  runs.forEach(run => {

    // 🔥 FILTER OUT PAST GAMES (DATE ONLY)
    const runDate = new Date(run.start_time);
    runDate.setHours(0,0,0,0);
    if (runDate < today) return;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${formatDateTime(run.start_time)}</h3>

      <p><strong>${run.location_name}</strong></p>

      ${run.map_link ? `
        <p>
          <a href="${run.map_link}" target="_blank">View Map</a>
        </p>
      ` : ""}

      <p><em>${run.notes || ""}</em></p>

      <p><strong>${run.player_count} / ${run.max_players}</strong> players</p>

      <input placeholder="Your name" id="name-${run.id}" ${activeUser ? "readonly" : ""}/>
      <input placeholder="Your email" id="email-${run.id}" ${activeUser ? "readonly" : ""}/>

      <button onclick="joinRun(${run.id})">I'm In</button>
      <button onclick="leaveRun(${run.id})">Cancel</button>

      <div id="players-${run.id}">Loading players...</div>
    `;

    container.appendChild(div);

    loadPlayers(run.id);
  });
}

/* ===== SIGNUP ===== */
async function joinRun(id) {
  if (!authReady || !activeUser) {
    alert("Please sign in below before registering.");
    return;
  }

  const name = document.getElementById(`name-${id}`).value;
  const email = document.getElementById(`email-${id}`).value;

  if (!name || !email) {
    alert("Enter name and email");
    return;
  }

  let data;
  try {
    const res = await fetch(`${API_URL}/api/signup`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        run_id: id,
        name,
        email,
        clerk_user_id: activeUser.id
      })
    });

    data = await res.json();
    if (!res.ok || data.success === false) {
      throw new Error(data.error || "Could not register for this game.");
    }
  } catch (err) {
    alert(err.message || "Could not register for this game.");
    return;
  }

  alert(
    data.status === "confirmed"
      ? "You're in ✅"
      : "Run is full — added to waitlist 🕒"
  );

  loadRuns();
}

/* ===== LOAD PLAYERS ===== */
async function loadPlayers(runId) {
  const res = await fetch(`${API_URL}/api/players?run_id=${runId}`);
  const players = await res.json();

  const list = players.map(p => {
    return `<li>${p.name} (${p.status})</li>`;
  }).join("");

  document.getElementById(`players-${runId}`).innerHTML = `<ul>${list}</ul>`;
}

/* ===== CANCEL ===== */
async function leaveRun(id) {
  if (!authReady || !activeUser) {
    alert("Please sign in below before canceling.");
    return;
  }

  const email = document.getElementById(`email-${id}`).value;

  if (!email) {
    alert("Enter your email to cancel");
    return;
  }

  try {
    const res = await fetch(`${API_URL}/api/cancel`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        run_id: id,
        email,
        clerk_user_id: activeUser.id
      })
    });

    const data = await res.json();
    if (!res.ok || data.success === false) {
      throw new Error(data.error || "Could not cancel registration.");
    }
  } catch (err) {
    alert(err.message || "Could not cancel registration.");
    return;
  }

  alert("Removed from run");

  loadRuns();
}

async function initAuth() {
  const authStatus = document.getElementById("auth-status");
  const signInCard = document.getElementById("runs-signin-card");
  const signInRoot = document.getElementById("runs-signin-root");

  if (!CLERK_PUBLISHABLE_KEY || CLERK_PUBLISHABLE_KEY.includes("REPLACE_ME")) {
    authStatus.textContent = "Set Clerk publishable key in register.html and runs.html to enable auth.";
    return;
  }

  await loadClerkScript();
  await window.Clerk.load();
  activeUser = window.Clerk.user || null;
  authReady = true;

  if (activeUser) {
    const fullName = [activeUser.firstName, activeUser.lastName].filter(Boolean).join(" ");
    const primaryEmail = activeUser.primaryEmailAddress?.emailAddress || "";
    authStatus.innerHTML = `
      <div class="auth-header-row">
        <div>Signed in as <strong>${fullName || activeUser.username || "User"}</strong> (${primaryEmail})</div>
        <button id="runs-logout-btn" class="secondary-btn" type="button">Log out</button>
      </div>
    `;
    signInCard.style.display = "none";
    document.getElementById("runs-logout-btn").addEventListener("click", async () => {
      await window.Clerk.signOut({ redirectUrl: "/runs.html" });
    });
  } else {
    authStatus.innerHTML = `You are not signed in yet. Sign in below, or <a href=\"/register.html\">create an account</a>.`;
    signInCard.style.display = "block";
    window.Clerk.mountSignIn(signInRoot, {
      signUpUrl: "/register.html",
      forceRedirectUrl: "/runs.html",
      appearance: CLERK_APPEARANCE
    });
  }

  await loadRuns();
}

function loadClerkScript() {
  if (window.Clerk) return Promise.resolve();

  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.async = true;
    script.crossOrigin = "anonymous";
    script.src = CLERK_JS_URL;
    script.setAttribute("data-clerk-publishable-key", CLERK_PUBLISHABLE_KEY);
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("Clerk script failed to load"));
    document.head.appendChild(script);
  });
}

function populateIdentityFields() {
  if (!activeUser) return;

  const fullName = [activeUser.firstName, activeUser.lastName].filter(Boolean).join(" ");
  const primaryEmail = activeUser.primaryEmailAddress?.emailAddress || "";

  document.querySelectorAll("[id^='name-']").forEach(el => {
    if (!el.value) el.value = fullName;
  });

  document.querySelectorAll("[id^='email-']").forEach(el => {
    if (!el.value) el.value = primaryEmail;
  });
}

/* INIT */
initAuth()
  .then(populateIdentityFields)
  .catch(() => {
    document.getElementById("auth-status").textContent = "Clerk failed to load. Refresh and try again.";
  });
</script>

</body>
</html>
