<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Upcoming OGBA Pickup Games</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <a href="/" class="logo">
    <img src="OGBA-logo.png" alt="OGBA Logo" />
  </a>

  <div class="menu-toggle" onclick="toggleMenu()">&#9776;</div>

  <div class="nav-links" id="navLinks">
    <a href="/runs.html">Games</a>
    <a href="/about.html">About</a>
    <a href="/register.html">Register</a>
    <a href="/admin.html">Admin</a>
  </div>
</div>

<div class="container">
  <h1>Upcoming OGBA Pickup Games</h1>
  <div id="runs" class="admin-grid"></div>
</div>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

const API_URL = "https://ogba-api.erikstromstad.workers.dev";

/* ===== FORMAT DATE (SAFE) ===== */
function formatDateTime(dateString) {
  const [datePart, timePart] = dateString.split("T");
  const [year, month, day] = datePart.split("-");
  const [hour, minute] = timePart.split(":");

  const dateObj = new Date(year, month - 1, day, hour, minute);

  const formattedDate = dateObj.toLocaleDateString("en-US", {
    weekday: "long",
    month: "numeric",
    day: "numeric",
    year: "numeric"
  });

  const formattedTime = dateObj.toLocaleTimeString("en-US", {
    hour: "numeric",
    minute: "2-digit"
  });

  return `${formattedDate} at ${formattedTime}`;
}

/* ===== LOAD RUNS ===== */
async function loadRuns() {
  const res = await fetch(`${API_URL}/api/runs`);
  const runs = await res.json();

  const container = document.getElementById("runs");
  container.innerHTML = "";

  const today = new Date();
  today.setHours(0,0,0,0);

  runs.forEach(run => {

    // 🔥 FILTER OUT PAST GAMES (DATE ONLY)
    const runDate = new Date(run.start_time);
    runDate.setHours(0,0,0,0);
    if (runDate < today) return;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${formatDateTime(run.start_time)}</h3>

      <p><strong>${run.location_name}</strong></p>

      ${run.map_link ? `
        <p>
          <a href="${run.map_link}" target="_blank">View Map</a>
        </p>
      ` : ""}

      <p><em>${run.notes || ""}</em></p>

      <p><strong>${run.player_count} / ${run.max_players}</strong> players</p>

      <input placeholder="Your name" id="name-${run.id}" />
      <input placeholder="Your email" id="email-${run.id}" />

      <button onclick="joinRun(${run.id})">I'm In</button>
      <button onclick="leaveRun(${run.id})">Cancel</button>

      <div id="players-${run.id}">Loading players...</div>
    `;

    container.appendChild(div);

    loadPlayers(run.id);
  });
}

/* ===== SIGNUP ===== */
async function joinRun(id) {
  const name = document.getElementById(`name-${id}`).value;
  const email = document.getElementById(`email-${id}`).value;

  if (!name || !email) {
    alert("Enter name and email");
    return;
  }

  const res = await fetch(`${API_URL}/api/signup`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      run_id: id,
      name,
      email
    })
  });

  const data = await res.json();

  alert(
    data.status === "confirmed"
      ? "You're in ✅"
      : "Run is full — added to waitlist 🕒"
  );

  loadRuns();
}

/* ===== LOAD PLAYERS ===== */
async function loadPlayers(runId) {
  const res = await fetch(`${API_URL}/api/players?run_id=${runId}`);
  const players = await res.json();

  const list = players.map(p => {
    return `<li>${p.name} (${p.status})</li>`;
  }).join("");

  document.getElementById(`players-${runId}`).innerHTML = `<ul>${list}</ul>`;
}

/* ===== CANCEL ===== */
async function leaveRun(id) {
  const email = document.getElementById(`email-${id}`).value;

  if (!email) {
    alert("Enter your email to cancel");
    return;
  }

  await fetch(`${API_URL}/api/cancel`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      run_id: id,
      email
    })
  });

  alert("Removed from run");

  loadRuns();
}

/* INIT */
loadRuns();
</script>

</body>
</html>
